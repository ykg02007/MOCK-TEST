<!DOCTYPE html>
<html>
<head>
  <title>My App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>My First App 🚀</h1>
  <input id="name" placeholder="Enter your name">
  <br><br>
  <button onclick="greet()">Greet Me</button>

  <h2 id="output"></h2>

  <script>
    function greet() {
      let name = document.getElementById("name").value;
      document.getElementById("output").innerText = "Hello " + name + " 👋";
    }
  </script>

</body>
</html>
